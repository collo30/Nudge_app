<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Hand drawn wiggle effect -->
    <filter id="wiggle" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <!-- Background - White -->
  <rect width="512" height="512" fill="#ffffff" />

  <!-- Centered Content -->
  <g transform="translate(56, 56) scale(4)">
    
    <!-- Bill (Back) - Tilted for personality -->
    <g transform="rotate(-6, 50, 40)">
        <path d="M30 25 L30 5 L70 5 L70 25" stroke="#064e3b" stroke-width="4" fill="#ecfccb" stroke-linejoin="round" />
        <path d="M50 8 V17" stroke="#064e3b" stroke-width="3" opacity="0.4" stroke-linecap="round" />
    </g>

    <!-- Pocket (Main) -->
    <path d="M15 20 H85 V60 C85 85 70 95 50 95 C30 95 15 85 15 60 V20 Z" fill="#fff" stroke="#064e3b" stroke-width="4" stroke-linejoin="round" />

    <!-- Dashed Stitching Detail -->
    <path d="M19 20 V60 C19 82 32 91 50 91 C68 91 81 82 81 60 V20" fill="none" stroke="#064e3b" stroke-width="2" stroke-dasharray="4,4" opacity="0.3" filter="url(#wiggle)" />
    
  </g>
</svg>
